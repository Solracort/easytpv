<h2 mat-dialog-title>Realizar Cobro</h2>
<mat-dialog-content>
  <div class="checkout-form">
    <div class="amount-section">
      <p>Subtotal: <strong>€{{ order.total | number: '1.2-2' }}</strong></p>
      
      <mat-form-field appearance="outline">
        <mat-label>Propina (Opcional)</mat-label>
        <input matInput type="number" [(ngModel)]="tip" min="0" step="0.01" />
      </mat-form-field>

      <div class="total-display">
        <span>Total Final:</span>
        <span class="total-amount">€{{ getTotalWithTip() | number: '1.2-2' }}</span>
      </div>
    </div>

    <div class="payment-method-section">
      <label>Forma de Pago:</label>
      <mat-radio-group [(ngModel)]="paymentMethod">
        <mat-radio-button value="cash">Efectivo</mat-radio-button>
        <mat-radio-button value="card">Tarjeta</mat-radio-button>
      </mat-radio-group>
    </div>
  </div>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancelar</button>
  <button mat-raised-button color="primary" (click)="completeOrder()">
    Cobrar €{{ getTotalWithTip() | number: '1.2-2' }}
  </button>
</mat-dialog-actions>
