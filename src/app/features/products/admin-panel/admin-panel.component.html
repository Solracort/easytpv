<div class="admin-panel-container">
  <div class="panel-header">
    <h2>Administración de Productos</h2>
    <button mat-raised-button color="primary" (click)="openCreateProductDialog()">
      <mat-icon>add</mat-icon>
      Nuevo Producto
    </button>
  </div>

  <div *ngIf="isLoading" class="loading-container">
    <app-loading-spinner></app-loading-spinner>
  </div>

  <div *ngIf="!isLoading && products.length > 0" class="table-container">
    <table mat-table [dataSource]="products" class="products-table">
      <!-- Nombre Column -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let element">{{ element.name }}</td>
      </ng-container>

      <!-- Categoría Column -->
      <ng-container matColumnDef="category">
        <th mat-header-cell *matHeaderCellDef>Categoría</th>
        <td mat-cell *matCellDef="let element">{{ element.category }}</td>
      </ng-container>

      <!-- Precio Column -->
      <ng-container matColumnDef="price">
        <th mat-header-cell *matHeaderCellDef>Precio</th>
        <td mat-cell *matCellDef="let element">€{{ element.price | number: '1.2-2' }}</td>
      </ng-container>

      <!-- Disponible Column -->
      <ng-container matColumnDef="available">
        <th mat-header-cell *matHeaderCellDef>Disponible</th>
        <td mat-cell *matCellDef="let element">
          <button 
            mat-icon-button 
            [color]="element.available ? 'accent' : 'warn'"
            (click)="toggleAvailability(element)"
            [matTooltip]="element.available ? 'Click para desactivar' : 'Click para activar'">
            <mat-icon>{{ element.available ? 'check_circle' : 'cancel' }}</mat-icon>
          </button>
        </td>
      </ng-container>

      <!-- Acciones Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let element">
          <button 
            mat-icon-button 
            color="primary" 
            (click)="openEditProductDialog(element)"
            matTooltip="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button 
            mat-icon-button 
            color="warn" 
            (click)="confirmDeleteProduct(element)"
            matTooltip="Eliminar">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>

  <div *ngIf="!isLoading && products.length === 0" class="empty-state">
    <mat-icon>inventory_2</mat-icon>
    <p>No hay productos. Crea uno para empezar.</p>
    <button mat-raised-button color="primary" (click)="openCreateProductDialog()">
      <mat-icon>add</mat-icon>
      Crear Producto
    </button>
  </div>
</div>
