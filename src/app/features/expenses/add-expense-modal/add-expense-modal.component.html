<h2 mat-dialog-title>Agregar Gasto</h2>
<mat-dialog-content>
  <div class="form-container">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Monto</mat-label>
      <input matInput type="number" [(ngModel)]="amount" min="0" step="0.01" placeholder="0.00" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Descripción</mat-label>
      <input matInput [(ngModel)]="description" placeholder="Ej: Agua, Gas, Insumos..." />
    </mat-form-field>
  </div>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancelar</button>
  <button mat-raised-button color="primary" (click)="addExpense()">
    Guardar Gasto
  </button>
</mat-dialog-actions>
